name: 🔄 Fetch Trends Daily

on:
  # Déclenche tous les jours à 6h UTC (8h Paris)
  schedule:
    - cron: '0 6 * * *'

  # Permet de déclencher manuellement depuis GitHub
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    name: Fetch Trends + Rebuild
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Nécessaire pour committer trends.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch trends from RapidAPI
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node scripts/fetch-trends.mjs

      - name: Check if trends.json changed
        id: diff
        run: |
          if git diff --quiet public/data/trends.json 2>/dev/null || [ ! -f public/data/trends.json ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated trends.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "SearchGTrends Bot"
          git config user.email "bot@searchgtrends.com"
          git add public/data/trends.json
          git commit -m "🔄 Auto-update trends — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Vercel redeploy
        if: steps.diff.outputs.changed == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK"
            echo "✅ Vercel redeploy déclenché"
          else
            echo "ℹ️  Pas de VERCEL_DEPLOY_HOOK configuré — Vercel redéploie automatiquement sur push"
          fi

      - name: Summary
        run: |
          echo "## 📊 Résultat du fetch" >> $GITHUB_STEP_SUMMARY
          echo "- Date : $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Fichier : \`public/data/trends.json\`" >> $GITHUB_STEP_SUMMARY
          if [ -f public/data/trends.json ]; then
            COUNTRIES=$(node -e "const d=JSON.parse(require('fs').readFileSync('public/data/trends.json')); console.log(d.countries.length)")
            API_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('public/data/trends.json')); console.log(d.countries.filter(c=>c.source==='api').length)")
            echo "- Pays récupérés : $COUNTRIES" >> $GITHUB_STEP_SUMMARY
            echo "- Avec données API réelles : $API_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
