<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Search G Trends – Tendances Mondiales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <nav class="nav">
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        <div class="logo-text-main">Search G Trends</div>
        <div class="logo-text-sub">searchgtrends.com</div>
      </div>
    </div>
    <div class="nav-links">
      <a href="#global" class="active">Global</a>
      <a href="#api">API</a>
    </div>
  </nav>
</header>

<main>
  <section class="hero">
    <div class="hero-left">
      <div class="hero-kicker">Tendances en temps réel</div>
      <h1 class="hero-title">Les recherches <span>populaires</span>.</h1>
      <p class="hero-sub">Analyse des flux Google Trends mondiaux.</p>
    </div>
  </section>

  <section id="global" class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <div class="panel-title">Top Tendances</div>
      <select id="countrySelect" onchange="loadTrends(this.value)">
        <option value="FR">France 🇫🇷</option>
        <option value="US">USA 🇺🇸</option>
        <option value="GB">UK 🇬🇧</option>
        <option value="DE">Allemagne 🇩🇪</option>
        <option value="BR">Brésil 🇧🇷</option>
      </select>
    </div>
    <ul class="trend-list" id="trend-list-container">
      <li class="trend-item">Chargement...</li>
    </ul>
  </section>

  <section id="api" class="panel">
    <div class="panel-title">Statut API</div>
    <p style="font-size:0.8rem; color:var(--muted)">Connecté au flux Google Trends RSS via Vercel.</p>
  </section>
</main>

<footer>
  <div>© <span id="year"></span> searchgtrends.com</div>
</footer>

<script src="script.js"></script>
</body>
</html>
