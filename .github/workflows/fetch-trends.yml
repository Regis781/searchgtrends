name: 🔄 Fetch Trends Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    name: Fetch Trends + Rebuild
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # 🎯 CONFIGURATION CRUCIALE : Répertoire de travail pour le sous-projet
    defaults:
      run:
        working-directory: searchgtrends/home/searchgtrends

    # Correction de la variable pour supprimer l'avertissement Node.js 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm ci

      - name: Fetch trends from RapidAPI
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node scripts/fetch-trends.mjs

      - name: Check if trends.json changed
        id: diff
        run: |
          git add public/data/trends.json 2>/dev/null || true
          if git diff-index --quiet HEAD public/data/trends.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated trends.json
        if: steps.diff.outputs.changed == 'true'
        # On repasse à la racine du dépôt pour exécuter les commandes Git globales
        working-directory: ./ 
        run: |
          git config user.name "SearchGTrends Bot"
          git config user.email "bot@searchgtrends.com"
          git add searchgtrends/home/searchgtrends/public/data/trends.json
          git commit -m "🔄 Auto-update trends — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Vercel redeploy
        if: steps.diff.outputs.changed == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK"
            echo "✅ Vercel redeploy déclenché"
          else
            echo "ℹ️ Pas de VERCEL_DEPLOY_HOOK configuré"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📊 Résultat du fetch" >> $GITHUB_STEP_SUMMARY
          echo "- Date : $(date -u)" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "public/data/trends.json" ]; then
            COUNTRIES=$(node -e "try { const d=JSON.parse(require('fs').readFileSync('public/data/trends.json')); console.log(d.countries?.length || 0); } catch(e) { console.log(0); }")
            echo "- Pays enregistrés : $COUNTRIES" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Le fichier \`trends.json\` n'a pas pu être trouvé dans le dossier public." >> $GITHUB_STEP_SUMMARY
          fi
