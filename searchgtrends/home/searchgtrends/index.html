<!doctype html>
<html lang="fr">
  <head>
    <!-- Google Tag Manager -->
    <script>
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-K3STRHVT');
    </script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SearchGTrends — Tendances mondiales de recherche</title>
    <meta name="description" content="Découvrez les mots les plus recherchés sur le web par pays en temps réel." />

    <!-- Google Search Console -->
    <meta name="google-site-verification" content="JiEn_BlI0oFPTCEmcOP4ApiANcUn4Z7wXJ-fpxjRjuU" />
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K3STRHVT"
      height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Bannière de consentement RGPD -->
    <div id="consent-banner" style="
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: sans-serif;
      z-index: 9999;
    ">
      <span>
        Nous utilisons des cookies pour mesurer l’audience et améliorer SearchGTrends.
      </span>

      <div>
        <button id="consent-accept" style="
          background: #4CAF50;
          color: white;
          border: none;
          padding: 10px 15px;
          margin-right: 10px;
          cursor: pointer;
        ">Accepter</button>

        <button id="consent-deny" style="
          background: #777;
          color: white;
          border: none;
          padding: 10px 15px;
          cursor: pointer;
        ">Refuser</button>
      </div>
    </div>

    <!-- Script de gestion du consentement -->
    <script>
      function updateConsent(status) {
        gtag('consent', 'update', {
          ad_storage: status,
          analytics_storage: status
        });
      }

      const banner = document.getElementById("consent-banner");
      const acceptBtn = document.getElementById("consent-accept");
      const denyBtn = document.getElementById("consent-deny");

      const saved = localStorage.getItem("sgt-consent");
      if (saved) {
        banner.style.display = "none";
        updateConsent(saved);
      }

      acceptBtn.onclick = () => {
        localStorage.setItem("sgt-consent", "granted");
        updateConsent("granted");
        banner.style.display = "none";
      };

      denyBtn.onclick = () => {
        localStorage.setItem("sgt-consent", "denied");
        updateConsent("denied");
        banner.style.display = "none";
      };
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
