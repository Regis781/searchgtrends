name: 🔄 Fetch Trends Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    name: Fetch Trends + Rebuild
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find project directory
        id: finddir
        run: |
          # Trouve le dossier contenant package.json et nettoie le chemin (retire le './' initial)
          DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -1 | xargs dirname | sed 's|^\./||')
          
          # Si le projet est à la racine, on s'assure que la variable reste vide pour GitHub Actions
          if [ "$DIR" = "." ]; then DIR=""; fi
          
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "Found project at: $DIR"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ${{ steps.finddir.outputs.dir }}

      - name: Fetch trends from RapidAPI
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node scripts/fetch-trends.mjs
        working-directory: ${{ steps.finddir.outputs.dir }}

      - name: Check if trends.json changed
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated trends.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "SearchGTrends Bot"
          git config user.email "bot@searchgtrends.com"
          git add -A
          git commit -m "🔄 Auto-update trends — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Vercel redeploy
        if: steps.diff.outputs.changed == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK"
            echo "✅ Vercel redeploy déclenché"
          else
            echo "ℹ️  Vercel redéploie automatiquement sur push"
          fi
